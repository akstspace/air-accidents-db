server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Required for SharedArrayBuffer (used by PGlite and HuggingFace Transformers WASM).
    # "credentialless" (vs "require-corp") also enables SharedArrayBuffer but allows
    # cross-origin resources (e.g. map tiles from CartoCDN) that lack a CORP header.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # Serve static assets with long-lived cache (Vite fingerprints filenames)
    location ~* \.(?:js|css|wasm|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-add COOP/COEP since add_header inside location blocks overrides parent
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        try_files $uri =404;
    }

    # SPA fallback — all unmatched routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}